<!DOCTYPE html>

    <style>

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; user-select: none; }
        .quiz-card { background: var(--white); width: 100%; max-width: 900px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--maroon); padding: 30px; }

        input, select { width: 100%; padding: 14px; border-radius: 8px; border: 1.5px solid #ccc; font-size: 1.1rem; outline: none; box-sizing: border-box; background: #fff; margin-bottom: 10px; display: block; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt { padding: 18px; border: 2px solid #ececec; border-radius: 12px; cursor: pointer; transition: 0.2s; text-align: center; font-size: 1.2rem; background: #fff; font-weight: 600; }
        .opt:hover { border-color: var(--gold); background: #fffcf0; }
        .correct { background: var(--correct) !important; color: white; border-color: var(--correct); }
        .wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong); }
        .btn { background: var(--maroon); color: var(--gold); padding: 14px 50px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; width: 100%; }
        .hidden { display: none !important; }
        #timer { color: var(--maroon); font-size: 1.6rem; font-weight: 800; border: 2px solid var(--gold); padding: 5px 15px; border-radius: 50px; }

<body oncontextmenu="return false;">

<div class="quiz-card">

            <button id="next-btn" class="btn hidden" style="width: 50%;" onclick="nextQuestion()">السؤال التالي ⮕</button>

</div>

<script>
    const MODEL_ID = "MODEL_03_VERIFIED_2026";
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",

        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // إصلاح مشكلة ظهور الفصل
    function updateClasses() {
        const stage = document.getElementById('stageSelect').value;
        const classSelect = document.getElementById('studentClass');
        classSelect.innerHTML = '<option value="">-- اختر الفصل --</option>';
        if (stage !== "") {
            classSelect.style.display = 'block';
            for (let i = 1; i <= 6; i++) {
                const opt = document.createElement('option');
                opt.value = `${stage} - ف${i}`;
                opt.innerText = `فصل ${i}`;
                classSelect.appendChild(opt);
            }
        } else {
            classSelect.style.display = 'none';
        }
    }

    let sName, sClass, currentIdx = 0, userScore = 0, timer;

    async function validateAndStart() {
        sName = document.getElementById('studentName').value.trim();
        sClass = document.getElementById('studentClass').value;
        if (sName.split(' ').length < 3) return alert("يرجى كتابة الاسم الثلاثي.");
        if (!sClass) return alert("يرجى اختيار الفصل.");
        
        const btn = document.getElementById('start-btn');
        btn.disabled = true; btn.innerText = "جاري التحقق...";
        
        const check = await db.collection("student_results").where("model_id", "==", MODEL_ID).where("name", "==", sName).get();
        if (!check.empty) { alert("لقد اختبرت هذا النموذج مسبقاً."); location.reload(); return; }

        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        loadQuestion();
    }

    const quizData = [

        { cat: "استيعاب المقروء", text: "تعتمد الأقمار الصناعية في مداراتها على توازن دقيق بين سرعتها المدارية وقوة جاذبية الأرض. فإذا زادت السرعة عن الحد المطلوب فإن القمر يخرج عن مساره نحو الفضاء، وإذا نقصت فإنه يسقط نحو الأرض ويحترق في الغلاف الجوي. هذا التوازن هو ما يسمح باستمرار خدمات البث والاتصالات العالمية.", q: "يفهم من النص أن العاملين المتحكمين في بقاء القمر الصناعي في مساره هما:", opts: ["السرعة المدارية والجاذبية", "البث والاتصالات", "الغلاف الجوي والحرارة", "حجم القمر وبعده"], ans: "السرعة المدارية والجاذبية", tip: "أ / عبدالعزيز الفيفي 🎓\nالنص ركز على التوازن بين السرعة والجاذبية." },
        { cat: "استيعاب المقروء", text: "تُعد 'العملات الرقمية المشفرة' تقنية تعتمد على تكنولوجيا البلوكشين لضمان الأمان واللامركزية. ومع أنها توفر سرعة في التحويلات الدولية، إلا أن تذبذب قيمتها العالي يجعلها استثماراً محفوفاً بالمخاطر، مما يتطلب من المستثمرين وعياً عميقاً بآليات السوق قبل التداول.", q: "الخاصية التي تجعل العملات المشفرة خطيرة في الاستثمار هي:", opts: ["تذبذب قيمتها العالي", "سرعة التحويلات", "تقنية البلوكشين", "اللامركزية"], ans: "تذبذب قيمتها العالي", tip: "أ / عبدالعزيز الفيفي 🎓\nالتذبذب هو مصدر الخطورة المذكور." },
        { cat: "استيعاب المقروء", text: "إن ظاهرة الشفق القطبي تنتج عن تصادم الجسيمات المشحونة القادمة من الشمس مع غازات الغلاف الجوي للأرض. تظهر هذه الأضواء الراقصة غالباً عند القطبين لأن المجال المغناطيسي للأرض يوجه هذه الجسيمات نحو تلك المناطق، مما يخلق لوحات فنية طبيعية تبهر الناظرين.", q: "سبب ظهور الشفق القطبي عند القطبين تحديداً هو:", opts: ["توجيه المجال المغناطيسي", "قوة حرارة الشمس", "كثافة غازات القطبين", "غياب الضوء في القطبين"], ans: "توجيه المجال المغناطيسي", tip: "أ / عبدالعزيز الفيفي 🎓\nالمجال المغناطيسي هو من يوجه الجسيمات للقطبين." },
        { cat: "استيعاب المقروء", text: "تعتبر بذور الشيا من 'الأطعمة الفائقة' نظراً لاحتوائها على نسب عالية من أوميغا 3 والألياف. وتساعد هذه البذور في تحسين الهضم وتنظيم مستويات السكر في الدم، لكن الخبراء يحذرون من استهلاكها بكميات كبيرة دون نقعها في الماء لتجنب مشاكل البلع أو الجفاف.", q: "النصيحة التي يقدمها الخبراء عند تناول بذور الشيا هي:", opts: ["نقعها في الماء", "أكلها جافة تماماً", "تجنبها نهائياً", "تناولها مع السكر"], ans: "نقعها في الماء", tip: "أ / عبدالعزيز الفيفي 🎓\nالتحذير كان من استهلاكها دون نقع." },
        { cat: "استيعاب المقروء", text: "التعلم المستمر هو المحرك الأساسي للنجاح المهني في عصر التحول الرقمي. فالمهارات التي كانت كافية قبل عشر سنوات أصبحت اليوم غير مواكبة لسوق العمل. لذا، فإن الموظف الناجح هو من يخصص وقتاً أسبوعياً لتطوير مهاراته التقنية والناعمة لضمان استمراريته وتطوره الوظيفي.", q: "المقصود بالتحول الوظيفي الناجح في النص هو:", opts: ["تطوير المهارات باستمرار", "تغيير الوظيفة سنوياً", "الاعتماد على مهارات الماضي", "ترك العمل التقني"], ans: "تطوير المهارات باستمرار", tip: "أ / عبدالعزيز الفيفي 🎓\nالتطوير الأسبوعي هو مفتاح النجاح." },
        { cat: "استيعاب المقروء", text: "تعتمد الزراعة المائية على زراعة النباتات في محلول مغذي بدلاً من التربة، مما يوفر حوالي 90% من المياه المستخدمة في الزراعة التقليدية. وتعد هذه التقنية حلاً مثالياً للمناطق الصحراوية التي تعاني من شح المياه، حيث تتيح إنتاج محاصيل وفيرة في مساحات صغيرة ومغلقة.", q: "الفائدة الكبرى للزراعة المائية في المناطق الصحراوية هي:", opts: ["توفير كميات كبيرة من الماء", "الاستغناء عن المحاليل", "زيادة مساحة الأراضي", "تبريد الجو المحيط"], ans: "توفير كميات كبيرة من الماء", tip: "أ / عبدالعزيز الفيفي 🎓\nالنص ذكر توفير 90% من المياه." },
        { cat: "استيعاب المقروء", text: "تعد القراءة السريعة مهارة تهدف لزيادة معدل الكلمات المقروءة دون الإخلال بالفهم. وتعتمد على تقليل 'التراجع البصري' وتوسيع مدى الرؤية للعين. ومع التدريب المستمر، يمكن للشخص مضاعفة سرعته، مما يساعده على تحصيل كم معارفي ضخم في وقت قياسي.", q: "تعتمد القراءة السريعة بشكل أساسي على:", opts: ["توسيع مدى رؤية العين", "حفظ الكلمات دون فهم", "تكرار قراءة الجملة", "إغلاق العين بين الجمل"], ans: "توسيع مدى رؤية العين", tip: "أ / عبدالعزيز الفيفي 🎓\nتقليل التراجع وتوسيع الرؤية هما الأساس." },
        { cat: "استيعاب المقروء", text: "حماية الغابات من الحرائق تتطلب نظام مراقبة مبكر يعتمد على الطائرات المسيرة والمستشعرات الحرارية. فالتدخل في الدقائق الأولى يحمي آلاف الأفدنة من الرماد، بينما التأخر لساعة واحدة قد يجعل السيطرة على الحريق مستحيلة بسبب سرعة الرياح وجفاف الأشجار.", q: "عامل الوقت في إطفاء حرائق الغابات يعتبر:", opts: ["حاسماً للسيطرة على الحريق", "غير مهم مع وجود الطائرات", "ثانوياً مقارنة بجفاف الأشجار", "مؤثراً فقط في وجود الرياح"], ans: "حاسماً للسيطرة على الحريق", tip: "أ / عبدالعزيز الفيفي 🎓\nالدقائق الأولى هي الفارق بين الحماية والرماد." },
        { cat: "استيعاب المقروء", text: "تعتبر 'السحابة الحسابية' ثورة في تخزين البيانات، حيث تتيح للمستخدمين الوصول لملفاتهم من أي مكان بالعالم. وبالرغم من سهولتها، تظل المخاوف الأمنية بشأن اختراق الخوادم هي العائق الوحيد الذي يقلق الشركات الكبرى، مما يدفعها لإنفاق المليارات على أنظمة التشفير.", q: "المشكلة التي تواجه الشركات مع التخزين السحابي هي:", opts: ["المخاوف الأمنية والاختراق", "صعوبة الوصول للملفات", "صغر مساحة التخزين", "قلة أنظمة التشفير"], ans: "المخاوف الأمنية والاختراق", tip: "أ / عبدالعزيز الفيفي 🎓\nالأمن هو العائق الوحيد المذكور." },
        { cat: "استيعاب المقروء", text: "تُستخدم الألياف البصرية في نقل الإنترنت بسرعات فائقة لأنها تعتمد على نبضات الضوء داخل أنابيب زجاجية دقيقة. هذه التقنية لا تتأثر بالتشويش الكهرومغناطيسي كالأسلاك النحاسية، مما يجعل جودة الاتصال ثابتة حتى في المسافات الطويلة جداً.", q: "تتميز الألياف البصرية عن الأسلاك النحاسية بـ:", opts: ["عدم التأثر بالتشويش", "رخص ثمن الزجاج", "ثقل وزن الأنابيب", "نقل الكهرباء بدلاً من الضوء"], ans: "عدم التأثر بالتشويش", tip: "أ / عبدالعزيز الفيفي 🎓\nعدم التأثر بالتشويش هو الميزة الفنية المذكورة." },
