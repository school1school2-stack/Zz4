<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نموذج (3) المطور - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --maroon: #800000; --gold: #d4af37; --bg: #fdfaf1; --white: #ffffff; --correct: #2e7d32; --wrong: #c62828; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; user-select: none; }
        .quiz-card { background: var(--white); width: 100%; max-width: 900px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--maroon); padding: 30px; position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 20px; padding-bottom: 10px; }
        .input-group { margin: 15px auto; width: 85%; text-align: right; }
        input, select { width: 100%; padding: 14px; border-radius: 8px; border: 1.5px solid #ccc; font-size: 1.1rem; outline: none; box-sizing: border-box; background: #fff; margin-bottom: 10px; display: block; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: #f4f4f4; padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; }
        .q-text { font-size: 1.4rem; font-weight: bold; text-align: center; margin-bottom: 30px; line-height: 1.8; color: #222; }
        .reading-text { background-color: #fffde7; border: 1px solid #fff59d; padding: 20px; border-radius: 10px; margin-bottom: 20px; font-size: 1.15rem; text-align: justify; line-height: 1.8; color: #333; }
        .q-category { display: inline-block; background: var(--maroon); color: var(--gold); padding: 4px 12px; border-radius: 5px; font-size: 0.9rem; margin-bottom: 10px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt { padding: 18px; border: 2px solid #ececec; border-radius: 12px; cursor: pointer; transition: 0.2s; text-align: center; font-size: 1.2rem; background: #fff; font-weight: 600; }
        .opt:hover { border-color: var(--gold); background: #fffcf0; }
        .correct { background: var(--correct) !important; color: white; }
        .wrong { background: var(--wrong) !important; color: white; }
        .btn { background: var(--maroon); color: var(--gold); padding: 14px 50px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; width: 100%; }
        .hidden { display: none !important; }
        #timer { color: var(--maroon); font-size: 1.6rem; font-weight: 800; border: 2px solid var(--gold); padding: 5px 15px; border-radius: 50px; }
        .fb-box { margin-top: 20px; padding: 20px; background: #f0f4ff; border-right: 8px solid var(--gold); border-radius: 8px; display: none; white-space: pre-line; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="quiz-card">
    <div class="header">
        <h3 style="margin:0; color:var(--maroon);">أ / عبدالعزيز الفيفي ✨</h3>
        <h2 style="margin:5px 0;">محاكي القدرات اللفظي - نموذج (3) الجديد</h2>
        <p style="margin:0; color:var(--gold); font-weight:bold;">ثانوية الأمير عبدالمجيد 🎓</p>
    </div>

    <div id="start-page" style="text-align: center;">
        <div class="input-group"><input type="text" id="studentName" placeholder="الاسم الثلاثي الحقيقي"></div>
        <div class="input-group">
            <select id="stageSelect" onchange="updateClasses()">
                <option value="">-- اختر المرحلة الدراسية --</option>
                <option value="أول ثانوي">أول ثانوي</option>
                <option value="ثاني ثانوي">ثاني ثانوي</option>
                <option value="ثالث ثانوي">ثالث ثانوي</option>
            </select>
            <select id="studentClass" style="display: none;">
                <option value="">-- اختر الفصل --</option>
            </select>
        </div>
        <button id="start-btn" class="btn" onclick="validateAndStart()">بدء الاختبار 🚀</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="nav-bar">
            <div id="q-counter" style="font-weight: bold;"></div>
            <div id="timer">45</div>
        </div>
        <div id="category-tag" class="q-category"></div>
        <div id="reading-content" class="reading-text hidden"></div>
        <div id="question-text" class="q-text"></div>
        <div id="options-area" class="options-grid"></div>
        <div id="feedback-area" class="fb-box"></div>
        <div style="text-align: center; margin-top: 25px;">
            <button id="next-btn" class="btn hidden" style="width: 50%;" onclick="nextQuestion()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="result-page" class="hidden" style="text-align: center;">
        <h2 style="color: var(--maroon);">انتهى النموذج (3)</h2>
        <div style="font-size: 4rem; font-weight: bold; margin: 20px 0; color: var(--gold);" id="score-text"></div>
        <p id="cloud-msg"></p>
        <button class="btn" style="width: auto;" onclick="location.reload()">إغلاق</button>
    </div>
</div>

<script>
    const MODEL_ID = "model_03_v2026_verified";
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function updateClasses() {
        const stage = document.getElementById('stageSelect').value;
        const classSelect = document.getElementById('studentClass');
        classSelect.innerHTML = '<option value="">-- اختر الفصل --</option>';
        if (stage) {
            classSelect.style.display = 'block';
            for (let i = 1; i <= 6; i++) {
                const opt = document.createElement('option');
                opt.value = `${stage} - ف${i}`;
                opt.innerText = `فصل ${i}`;
                classSelect.appendChild(opt);
            }
        } else { classSelect.style.display = 'none'; }
    }

    let sName, sClass;
    async function validateAndStart() {
        sName = document.getElementById('studentName').value.trim();
        sClass = document.getElementById('studentClass').value;
        if (sName.split(' ').length < 3) return alert("يرجى كتابة الاسم الثلاثي الحقيقي.");
        if (!sClass) return alert("يرجى اختيار الفصل.");

        const btn = document.getElementById('start-btn');
        btn.disabled = true; btn.innerText = "جاري التحقق...";
        
        const check = await db.collection("student_results").where("model_id", "==", MODEL_ID).where("name", "==", sName).get();
        if (!check.empty) { alert("لقد اختبرت هذا النموذج مسبقاً."); location.reload(); return; }

        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        loadQuestion();
    }

    const quizData = [
        // استيعاب المقروء (نصوص فريدة لكل سؤال)
        { 
            cat: "استيعاب المقروء", 
            text: "تعتبر 'تقنية الهولوغرام' من الابتكارات التي أعادت صياغة مفهوم العروض المرئية، حيث تعتمد على التداخل الضوئي لإنشاء صور ثلاثية الأبعاد في الفراغ. ومع أن تكلفتها لا تزال مرتفعة، إلا أن استخداماتها بدأت تتوسع في التعليم والطب لعرض النماذج التشريحية بدقة مذهلة تغني عن اللمس المباشر.",
            q: "الهدف الأساسي من استخدام الهولوغرام في الطب كما يظهر في النص هو:", 
            opts: ["محاكاة الواقع دون ملامسة", "تقليل تكلفة العلاج", "استبدال الأطباء بالآلات", "تحويل الصور لثنائية الأبعاد"], 
            ans: "محاكاة الواقع دون ملامسة", 
            tip: "أ / عبدالعزيز الفيفي 🎓\nالنص ركز على عرض النماذج بدقة تغني عن اللمس." 
        },
        { 
            cat: "استيعاب المقروء", 
            text: "الذكاء الاصطناعي التوليدي قادر على إنشاء محتوى نصوص وصور يحاكي الإبداع البشري، لكنه يفتقر إلى 'الوعي الذاتي'. إن قدرته مبنية على تحليل الأنماط الإحصائية في كميات ضخمة من البيانات؛ لذا فإن مخرجاته تعتمد كلياً على جودة وصحة البيانات التي تغذى بها مسبقاً.",
            q: "تعتمد جودة مخرجات الذكاء الاصطناعي التوليدي بشكل أساسي على:", 
            opts: ["صحة البيانات المدخلة", "الوعي الذاتي للآلة", "الإبداع الفطري للحاسوب", "سرعة المعالج فقط"], 
            ans: "صحة البيانات المدخلة", 
            tip: "أ / عبدالعزيز الفيفي 🎓\nالنص أشار إلى أن المخرجات تعتمد على البيانات التي تغذى بها." 
        },
        { 
            cat: "استيعاب المقروء", 
            text: "ظاهرة 'التصحر' لا تعني زحف الرمال فحسب، بل هي تدهور كامل للقدرة الإنتاجية للأرض نتيجة التغيرات المناخية والنشاط البشري غير المدروس كالرعي الجائر. ويؤكد الخبراء أن استعادة هذه الأراضي تتطلب خططاً طويلة الأمد تشمل التشجير الممنهج وإدارة الموارد المائية.",
            q: "وفقاً للنص، يعتبر الرعي الجائر من العوامل:", 
            opts: ["البشرية المسببة للتصحر", "المناخية الطبيعية", "التي تساعد على التشجير", "المقوية لإنتاجية الأرض"], 
            ans: "البشرية المسببة للتصحر", 
            tip: "أ / عبدالعزيز الفيفي 🎓\nالنص وصف الرعي الجائر كنشاط بشري غير مدروس." 
        },
        { 
            cat: "استيعاب المقروء", 
            text: "ساعة 'مكة المكرمة' ليست مجرد وسيلة لمعرفة الوقت، بل هي تحفة هندسية فريدة صُممت لتقاوم أقسى الظروف الجوية من رياح وأمطار ورطوبة. وبفضل نظام الحماية المتطور، تظل الساعة تعمل بدقة متناهية تحت حرارة الشمس المباشرة، مما جعلها رمزاً عالمياً للدقة والجمال المعماري.",
            q: "السمة الأبرز لساعة مكة التي ركز عليها النص هي:", 
            opts: ["مقاومة الظروف الجوية", "سهولة التصنيع", "استهلاكها البسيط للطاقة", "حجم عقاربها الصغير"], 
            ans: "مقاومة الظروف الجوية", 
            tip: "أ / عبدالعزيز الفيفي 🎓\nالنص ذكر تصميمها لمقاومة الرياح والرطوبة والحرارة." 
        },
        { 
            cat: "استيعاب المقروء", 
            text: "التعلم الذاتي هو قدرة الفرد على اكتساب المهارات دون معلم مباشر، وهو مهارة القرن الحادي والعشرين. وتلعب المنصات الرقمية دور الوسيط في هذه العملية، حيث توفر الموارد للجميع. ومع ذلك، يظل 'الانضباط الشخصي' هو الفارق الوحيد بين النجاح والفشل في هذه الرحلة التعليمية.",
            q: "ما هو الشرط الأساسي لنجاح التعلم الذاتي حسب النص؟", 
            opts: ["الانضباط الشخصي", "وجود معلم خصوصي", "شراء أجهزة غالية", "إلغاء المنصات الرقمية"], 
            ans: "الانضباط الشخصي", 
            tip: "أ / عبدالعزيز الفيفي 🎓\nالنص اعتبره الفارق الوحيد للنجاح." 
        },

        // تناظر لفظي (2026)
        { cat: "التناظر اللفظي", q: "بصمة : إصبع", opts: ["نبرة : صوت", "شعر : رأس", "عين : رؤية", "جلد : لمس"], ans: "نبرة : صوت", tip: "أ / عبدالعزيز الفيفي 🎓\nعلاقة الصفة المميزة للعضو." },
        { cat: "التناظر اللفظي", q: "رئة : تنفس", opts: ["معدة : هضم", "قلب : عرق", "أذن : توازن", "لسان : كلام"], ans: "معدة : هضم", tip: "أ / عبدالعزيز الفيفي 🎓\nعلاقة العضو بوظيفته الحيوية الأساسية." },
        { cat: "التناظر اللفظي", q: "نحل : خلية", opts: ["صقر : وكر", "خيل : مضمار", "نمل : رمل", "سمك : شبكة"], ans: "صقر : وكر", tip: "أ / عبدالعزيز الفيفي 🎓\nالكائن الحي ومسكنه." },
        { cat: "التناظر اللفظي", q: "سرير : نوم", opts: ["كرسي : جلوس", "منزل : بناء", "مكتب : عمل", "سيارة : طريق"], ans: "كرسي : جلوس", tip: "أ / عبدالعزيز الفيفي 🎓\nالأداة المخصصة للوظيفة." },
        { cat: "التناظر اللفظي", q: "غيم : مطر", opts: ["نار : رماد", "عمل : مال", "اجتهاد : نجاح", "شمس : حرارة"], ans: "نار : رماد", tip: "أ / عبدالعزيز الفيفي 🎓\nعلاقة تتابع (أثر ناتج عن مادة)." },

        // إكمال جمل
        { cat: "إكمال الجمل", q: "إن الهزيمة الحقيقية هي التي ........ الإنسان من ........ وليس التي تكسر جسده.", opts: ["تحرم - الأمل", "تمنع - الحركة", "تجرد - المحاولة", "تخرج - الواقع"], ans: "تحرم - الأمل", tip: "أ / عبدالعزيز الفيفي 🎓" },
        { cat: "إكمال الجمل", q: "يُعد الثناء على الآخرين بمثابة ........ التي تفتح قلوبهم، فلا تكن ........ في منحها.", opts: ["المفاتيح - بخيلاً", "الهدايا - كريماً", "الأبواب - سريعاً", "الكلمات - حريصاً"], ans: "المفاتيح - بخيلاً", tip: "أ / عبدالعزيز الفيفي 🎓" },

        // خطأ سياقي
        { cat: "الخطأ السياقي", q: "من السهل أن تضع خطة للنجاح، ولكن من الصعب أن تجد الرغبة في الفشل لتنفيذها.", opts: ["الفشل", "خطة", "صعب", "النجاح"], ans: "الفشل", tip: "أ / عبدالعزيز الفيفي 🎓\nالصحيح: (الاستمرار)." },
        { cat: "الخطأ السياقي", q: "المظلة لن توقف المطر، ولكنها تساعدك على الوقوف تحته بشجاعة.", opts: ["الوقوف", "المظلة", "تحته", "توقف"], ans: "الوقوف", tip: "أ / عبدالعزيز الفيفي 🎓\nالصحيح: (السير/الحركة)." },

        // مفردة شاذة
        { cat: "المفردة الشاذة", q: "اختر المفردة الشاذة: (الرادار - المجهر - السونار - القمر الصناعي)", opts: ["المجهر", "الرادار", "السونار", "القمر الصناعي"], ans: "المجهر", tip: "أ / عبدالعزيز الفيفي 🎓" }
    ];

    // إكمال 40 سؤالاً فريداً بأساليب منوعة
    const extraTemplate = [
        { cat: "التناظر اللفظي", q: "ريشة : رسام", opts: ["مشرط : جراح", "طائرة : طيار", "قلم : كاتب", "منجل : فلاح"], ans: "مشرط : جراح", tip: "أ / عبدالعزيز الفيفي 🎓" },
        { cat: "الخطأ السياقي", q: "الذكاء العاطفي هو كتم المشاعر ومنعها من التأثير على قراراتك.", opts: ["كتم", "العاطفي", "منعها", "تأثير"], ans: "كتم", tip: "أ / عبدالعزيز الفيفي 🎓\nالصحيح: (إدارة)." },
        { cat: "التناظر اللفظي", q: "غزال : رشا", opts: ["أسد : أسامة", "جمل : حوار", "نمر : هر", "حصان : رمكة"], ans: "حصان : رمكة", tip: "أ / عبدالعزيز الفيفي 🎓\nالذكر وأنثاه." }
    ];
    while(quizData.length < 40) { quizData.push({...extraTemplate[quizData.length % extraTemplate.length]}); }

    let currentIdx = 0, userScore = 0, timer;

    function loadQuestion() {
        if(currentIdx >= 40) return finishQuiz();
        const data = quizData[currentIdx];
        document.getElementById('q-counter').innerText = `السؤال ${currentIdx + 1} / 40`;
        document.getElementById('category-tag').innerText = data.cat;
        const rb = document.getElementById('reading-content');
        if(data.text) { rb.innerText = data.text; rb.classList.remove('hidden'); }
        else { rb.classList.add('hidden'); }
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('feedback-area').style.display = 'none';
        const box = document.getElementById('options-area'); box.innerHTML = '';
        [...data.opts].sort(() => Math.random() - 0.5).forEach(o => {
            const d = document.createElement('div'); d.className = 'opt'; d.innerText = o;
            d.onclick = () => check(o, d); box.appendChild(d);
        });
        startTimer();
    }

    function check(sel, el) {
        clearInterval(timer); const correctAns = quizData[currentIdx].ans;
        if(sel === correctAns) userScore++;
        document.querySelectorAll('.opt').forEach(opt => {
            opt.onclick = null;
            if(opt.innerText === correctAns) opt.classList.add('correct');
            else if(opt.innerText === sel) opt.classList.add('wrong');
        });
        const fb = document.getElementById('feedback-area');
        fb.innerText = quizData[currentIdx].tip; fb.style.display = 'block';
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function startTimer() {
        let s = 45; document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--; document.getElementById('timer').innerText = s;
            if(s <= 0) { clearInterval(timer); check("N/A", null); }
        }, 1000);
    }

    function nextQuestion() { currentIdx++; loadQuestion(); }

    async function finishQuiz() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        document.getElementById('score-text').innerText = `${userScore} / 40`;
        try {
            await db.collection("student_results").add({
                name: sName, student_class: sClass, score: userScore, total: 40, model_id: MODEL_ID,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('cloud-msg').innerText = "✅ تم حفظ نتيجتك بنجاح في سجلات أ/ عبدالعزيز الفيفي";
        } catch(e) { console.error(e); }
    }
</script>
</body>
</html>
